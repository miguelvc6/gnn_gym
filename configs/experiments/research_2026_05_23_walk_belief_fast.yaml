experiment:
  name: research_2026_05_23_walk_belief_fast
  seeds: [0]
  write_research_results: true
  research_results_path: research_results.tsv

models:
  - walk_belief_transformer

datasets:
  - cora
  - pubmed

training:
  max_epochs: 50
  patience: 15
  scheduler: none

sweep:
  model.hidden_channels: [32, 64]
  model.walk_length: [3, 5]
  model.num_layers: [1]
  model.heads: [2]
  model.dropout: [0.2, 0.5]
  training.lr: [0.01]
  training.weight_decay: [0.0005]
