experiment:
  name: research_2026_05_22_temp_ladder_fast
  seeds: [0]
  write_research_results: true
  research_results_path: research_results.tsv

models:
  - temp_ladder_gnn

datasets:
  - cora
  - pubmed

training:
  max_epochs: 50
  patience: 15
  scheduler: none

sweep:
  model.hidden_channels: [16, 32]
  model.num_layers: [2, 3]
  model.temperatures: [[0.5, 1.0, 2.0], [0.25, 1.0, 4.0]]
  model.dropout: [0.2, 0.5]
  training.lr: [0.01, 0.005]
  training.weight_decay: [0.0005]
