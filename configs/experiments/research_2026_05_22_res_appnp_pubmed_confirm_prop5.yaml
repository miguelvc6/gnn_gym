experiment:
  name: research_2026_05_22_res_appnp_pubmed_confirm_prop5
  seeds: [0, 1, 2]
  write_research_results: true
  research_results_path: research_results.tsv

models:
  - res_appnp_net

datasets:
  - pubmed

training:
  max_epochs: 200
  patience: 50
  scheduler: none

sweep:
  model.hidden_channels: [64]
  model.num_layers: [1]
  model.dropout: [0.2]
  model.propagation_steps: [5]
  model.alpha: [0.1]
  model.gate_init: [-4.0]
  training.lr: [0.01]
  training.weight_decay: [0.0005]
