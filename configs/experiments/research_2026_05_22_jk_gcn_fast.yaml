experiment:
  name: research_2026_05_22_jk_gcn_fast
  seeds: [0]
  write_research_results: true
  research_results_path: research_results.tsv

models:
  - jk_gcn

datasets:
  - cora
  - pubmed

training:
  max_epochs: 50
  patience: 15
  scheduler: none

sweep:
  model.hidden_channels: [32, 64]
  model.num_layers: [2, 3, 4]
  model.dropout: [0.2, 0.5]
  model.jk_mode: [cat]
  training.lr: [0.01, 0.005]
  training.weight_decay: [0.0005]
