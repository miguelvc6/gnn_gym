experiment:
  name: research_2026_05_22_jk_gcn_pubmed_confirm
  seeds: [0, 1, 2]
  write_research_results: true
  research_results_path: research_results.tsv

models:
  - jk_gcn

datasets:
  - pubmed

training:
  max_epochs: 200
  patience: 50
  scheduler: none

sweep:
  model.hidden_channels: [64]
  model.num_layers: [3]
  model.dropout: [0.5]
  model.jk_mode: [cat]
  training.lr: [0.01]
  training.weight_decay: [0.0005]
