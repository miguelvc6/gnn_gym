experiment:
  name: research_2026_05_23_concat_pool_molhiv_fast
  seeds: [0]
  write_research_results: true
  research_results_path: research_results.tsv

models:
  - gin

datasets:
  - ogbg-molhiv

training:
  max_epochs: 20
  patience: 5
  batch_size: 1024
  scheduler: none
  lr: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0

sweep:
  model.hidden_channels: [64]
  model.num_layers: [3]
  model.dropout: [0.2]
  model.eps_trainable: [true]
  model.pooling: [mean, mean_max_add]
  model.head_hidden_channels: [64]
