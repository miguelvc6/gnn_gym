experiment:
  name: research_2026_05_22_appnp_cora_refine
  seeds: [0]
  write_research_results: true
  research_results_path: research_results.tsv

models:
  - appnp_net

datasets:
  - cora

training:
  max_epochs: 50
  patience: 15
  scheduler: none

sweep:
  model.hidden_channels: [128]
  model.num_layers: [1]
  model.dropout: [0.3, 0.5, 0.7]
  model.propagation_steps: [5, 10, 20]
  model.alpha: [0.05, 0.1, 0.2]
  training.lr: [0.01, 0.005]
  training.weight_decay: [0.0005]
