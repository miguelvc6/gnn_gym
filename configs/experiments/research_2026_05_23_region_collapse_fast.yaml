experiment:
  name: research_2026_05_23_region_collapse_fast
  seeds: [0]
  write_research_results: true
  research_results_path: research_results.tsv

models:
  - region_collapse_gnn

datasets:
  - cora
  - pubmed

training:
  max_epochs: 50
  patience: 15
  scheduler: none

sweep:
  model.hidden_channels: [64, 128]
  model.num_layers: [1, 2]
  model.num_regions: [8, 16, 32]
  model.dropout: [0.2, 0.5]
  training.lr: [0.01]
  training.weight_decay: [0.0005]
